<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/reset.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/them_hang.css') }}"
    />
    <title>Thêm Sản Phẩm Mới</title>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h2>Thêm Sản Phẩm Mới</h2>
      </div>
      <div class="card-body">
        <form id="formThemSanPham" action="#" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="ten_san_pham">Tên sản phẩm</label>
              <input
                type="text"
                id="ten_san_pham"
                name="ten_san_pham"
                required
              />
            </div>
            <div class="form-group">
              <label for="ma_san_pham">Mã sản phẩm</label>
              <input type="text" id="ma_san_pham" name="ma_san_pham" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="gia_nhap">Giá nhập (đ)</label>
              <input type="number" id="gia_nhap" name="gia_nhap" required />
            </div>
            <div class="form-group">
              <label for="gia_ban">Giá bán (đ)</label>
              <input type="number" id="gia_ban" name="gia_ban" required />
            </div>
          </div>

          <div class="form-group full-width">
            <label for="id_loai_san_pham">Loại sản phẩm</label>
            <select id="id_loai_san_pham" name="id_loai_san_pham" required>
              <option value="" disabled selected>
                -- Chọn loại sản phẩm --
              </option>
              <option value="1">Áo khoác</option>
              <option value="2">Áo phông</option>
              <option value="3">Áo dài tay</option>
              <option value="4">Quần đùi</option>
              <option value="5">Quần dài</option>
              <option value="6">Giày</option>
              <option value="7">Dép</option>
              <option value="8">Phụ kiện kết hợp</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="mo_ta">Mô tả sản phẩm</label>
            <textarea id="mo_ta" name="mo_ta" rows="4"></textarea>
          </div>

          <div class="btn-group">
            <button type="reset" class="btn btn-reset">Xóa form</button>
            <button type="submit" class="btn btn-submit">Lưu sản phẩm</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      document
        .getElementById("formThemSanPham")
        .addEventListener("submit", function (e) {
          const giaNhap = parseFloat(document.getElementById("gia_nhap").value);
          const giaBan = parseFloat(document.getElementById("gia_ban").value);

          if (giaBan < giaNhap) {
            e.preventDefault();
            alert("Cảnh báo: Giá bán đang nhỏ hơn giá nhập kho!");
          }
        });
    </script>
  </body>
</html>
