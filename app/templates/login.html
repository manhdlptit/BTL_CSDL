<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - TrendyShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static', filename='css/reset.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="brand-header">
        <h2 class="brand-name">TrendyShop</h2>
        <p class="brand-subtitle">
          Chào mừng bạn trở lại với không gian thời trang
        </p>
      </div>

      <form action="#" method="post">
        <div class="group">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </div>
        </div>

        <div class="group">
          <label for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
        </div>

        <div class="form-actions">
          <label class="remember-me">
            <input type="checkbox" name="remember" /> Ghi nhớ đăng nhập
          </label>
          <a href="#" class="forgot-password">Quên mật khẩu?</a>
        </div>

        <div class="btn">
          <button type="submit">Đăng nhập</button>
        </div>

        <div class="link-to-sign-up">
          <p class="desc-to-sign-up">Bạn chưa có tài khoản?</p>
          <a href="{{ url_for('auth.signup') }}" class="sign-up-link"
            >Đăng ký ngay</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
